name: Release

on:
  schedule:
    - cron: "5 */12 * * *"
  push:
    branches:
      - "master"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  Discord:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Download Discord Stable
        run: |
          wget -qO - "https://discord.com/api/download?platform=linux&format=tar.gz" | tar -xz -C .
          mv ./Discord ./Discord_Updater

          mkdir ./worktable
          chmod +x ./Discord_Updater/updater_bootstrap

          ./Discord_Updater/updater_bootstrap --no-zenity ./worktable stable https://updates.discord.com/

          mv ./worktable/app-* ./Discord

          echo "Discord AppDir contents:"
          find ./Discord -maxdepth 3 -type f | sort

          echo "ASAR files:"
          find ./Discord -name "*.asar" -type f -print

      - name: Patch with Equilotl
        run: |
          wget -O EquilotlCli-Linux "https://github.com/Equicord/Equilotl/releases/latest/download/EquilotlCli-Linux"
          chmod +x ./EquilotlCli-Linux

          ./EquilotlCli-Linux -location ./Discord -install

          echo "Looking for generated Equicord files:"
          find "$HOME/.config/Equicord" -maxdepth 3 -type f -print || true

          if [ ! -f "$HOME/.config/Equicord/equicord.asar" ]; then
            echo "equicord.asar was not created by Equilotl"
            exit 1
          fi

          cp "$HOME/.config/Equicord/equicord.asar" ./Discord/resources/equicord.asar

          npm install -g asar

          rm -rf appasar
          mkdir appasar
          asar extract ./Discord/resources/app.asar appasar

          echo "Searching for hardcoded GitHub Actions path:"
          grep -R "/home/runner/.config/Equicord/equicord.asar" appasar || true

          grep -RIl "/home/runner/.config/Equicord/equicord.asar" appasar \
            | xargs -r sed -i 's|/home/runner/.config/Equicord/equicord.asar|../equicord.asar|g'

          asar pack appasar ./Discord/resources/app.asar

          echo "After Equicord patch:"
          find ./Discord/resources -maxdepth 2 -type f | grep -Ei "equicord|app.asar" || true

      - name: Patch AppImage files
        run: |
          cp ./AppRun ./Discord/.
          chmod +x ./Discord/AppRun

          cp ./discord.desktop ./Discord/.

          if [ -f ./Discord/resources/bootstrap/manifest.json ]; then
            sed -i 's/0/1/g' ./Discord/resources/bootstrap/manifest.json
          fi

      - name: Build AppImage
        run: |
          sudo apt update
          sudo apt install libfuse2 jq -y

          wget -O appimagetool-x86_64.AppImage "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

          VERSION="$(jq -r .version Discord/resources/build_info.json)"
          echo "Building Discord $VERSION"

          ARCH=x86_64 ./appimagetool-x86_64.AppImage \
            ./Discord \
            -n \
            -u 'gh-releases-zsync|Gur0v|discord-appimage|stable|Discord*.AppImage.zsync' \
            "Discord-${VERSION}-x86_64.AppImage"

          mkdir dist
          mv Discord*.AppImage dist/.
          mv *.zsync dist/. || true
          chmod +x dist/*.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-stable-x86_64.AppImage
          path: dist/*

  Release:
    needs: [Discord]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: discord-stable-x86_64.AppImage
          path: ./artifacts-dir

      - name: Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          title: Discord Stable AppImage Builds
          automatic_release_tag: stable
          prerelease: false
          draft: false
          files: |
            ./artifacts-dir/*
          repo_token: ${{ secrets.GITHUB_TOKEN }}
